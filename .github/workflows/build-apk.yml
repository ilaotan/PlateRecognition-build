# SPDX-License-Identifier: MIT
name: build-apk

on:
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build AAR & APK
    runs-on: ubuntu-22.04

    env:
      NDK_VERSION: 26.1.10909125
      NCNN_VERSION: 20240820
      ANDROID_API: 21
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            unzip zip

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            hyperlpr3-android-sdk-master/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('hyperlpr3-android-sdk-master/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: hyperlpr3-android-sdk-master
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Debug, OU=Android, O=Google, L=Mountain View, ST=California, C=US"

      - name: Build AAR
        working-directory: hyperlpr3-android-sdk-master
        run: |
          ./gradlew :hyperlpr3:assembleRelease \
            --stacktrace \
            -Pandroid.useAndroidX=true

      - name: Build APK
        working-directory: hyperlpr3-android-sdk-master
        run: |
          ./gradlew :app:assembleRelease \
            --stacktrace \
            -Pandroid.useAndroidX=true

      - name: Collect APK artefacts
        working-directory: hyperlpr3-android-sdk-master
        run: |
          mkdir -p "${{ env.BUILD_DIR }}/apk-out"
          find app/build/outputs -name "*.apk" -exec cp -v {} "${{ env.BUILD_DIR }}/apk-out/" \;
          find hyperlpr3/build/outputs -name "*.aar" -exec cp -v {} "${{ env.BUILD_DIR }}/apk-out/" \;
          ls -la "${{ env.BUILD_DIR }}/apk-out"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hyperlpr3-apk
          path: ${{ env.BUILD_DIR }}/apk-out/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: hyperlpr3-aar
          path: ${{ env.BUILD_DIR }}/apk-out/*.aar
          if-no-files-found: warn
          retention-days: 30