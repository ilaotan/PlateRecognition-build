# SPDX-License-Identifier: MIT
name: build-apk

on:
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build AAR & APK
    runs-on: ubuntu-22.04

    env:
      NDK_VERSION: 26.1.10909125
      NCNN_VERSION: 20240820
      ANDROID_API: 21
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang g++-multilib \
            git ca-certificates \
            protobuf-compiler libprotobuf-dev \
            unzip zip

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/android-ndk-r${{ env.NDK_VERSION }}
          key: ndk-r${{ env.NDK_VERSION }}-v1

      - name: Install Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}"
          cd "${{ runner.temp }}"
          # 26.1.10909125 is the internal version of NDK r26b. The download
          # filename uses the letter form, not the numeric version.
          curl -fSL -o ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-r26b-linux.zip"
          unzip -q ndk.zip
          rm ndk.zip

      - name: Resolve NDK path
        id: ndk
        run: |
          NDK_DIR="$(find "${{ runner.temp }}" -maxdepth 1 -type d -name 'android-ndk-r*' | head -n1)"
          echo "ANDROID_NDK_HOME=${NDK_DIR}" >> "$GITHUB_ENV"
          echo "NDK_DIR=${NDK_DIR}" >> "$GITHUB_OUTPUT"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            hyperlpr3-android-sdk-master/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('hyperlpr3-android-sdk-master/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build NCNN host tools (onnx2ncnn / ncnnoptimize)
        run: |
          bash scripts/build_ncnn_host.sh \
            ./ncnn \
            "${{ env.BUILD_DIR }}/ncnn-host-install"

      - name: Build NCNN for Android (all ABIs)
        run: |
          for ABI in arm64-v8a armeabi-v7a; do
            bash scripts/build_ncnn_android.sh \
              ./ncnn \
              "${{ env.BUILD_DIR }}/ncnn-install" \
              "${{ env.ANDROID_NDK_HOME }}" \
              "${ABI}"
          done

      - name: Download OpenCV Android SDK
        run: |
          mkdir -p "${{ env.BUILD_DIR }}/opencv-android"
          cd "${{ env.BUILD_DIR }}/opencv-android"
          if [ ! -d sdk ]; then
            curl -fSL -o opencv.zip \
              "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-android-sdk.zip"
            unzip -q opencv.zip
            rm opencv.zip
            mv OpenCV-android-sdk sdk 2>/dev/null || true
          fi

      - name: Convert ONNX models to NCNN
        run: |
          bash scripts/convert_onnx_to_ncnn.sh \
            "${{ env.BUILD_DIR }}/ncnn-host-install/bin" \
            ./PlateDetectionRecognition/test \
            "${{ env.BUILD_DIR }}/plate_ncnn_models"

      - name: Copy NCNN models into Android assets
        run: |
          mkdir -p hyperlpr3-android-sdk-master/hyperlpr3/src/main/assets/plate_ncnn
          cp -f "${{ env.BUILD_DIR }}/plate_ncnn_models/"*.param \
                "${{ env.BUILD_DIR }}/plate_ncnn_models/"*.bin \
                hyperlpr3-android-sdk-master/hyperlpr3/src/main/assets/plate_ncnn/ 2>/dev/null \
                || (echo "ERROR: model files not produced" && exit 1)
          ls -la hyperlpr3-android-sdk-master/hyperlpr3/src/main/assets/plate_ncnn/

      - name: Configure gradle.properties
        working-directory: hyperlpr3-android-sdk-master
        run: |
          cat >> gradle.properties <<EOF
NCNN_ROOT=${{ env.BUILD_DIR }}/ncnn-install
OPENCV_ANDROID=${{ env.BUILD_DIR }}/opencv-android
EOF
          cat gradle.properties

      - name: Pass env to gradle
        working-directory: hyperlpr3-android-sdk-master
        run: |
          echo "NCNN_ROOT=${{ env.BUILD_DIR }}/ncnn-install" >> $GITHUB_ENV
          echo "OPENCV_ANDROID=${{ env.BUILD_DIR }}/opencv-android" >> $GITHUB_ENV

      - name: Make gradlew executable
        working-directory: hyperlpr3-android-sdk-master
        run: chmod +x gradlew

      - name: Build AAR
        working-directory: hyperlpr3-android-sdk-master
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NCNN_ROOT: ${{ env.BUILD_DIR }}/ncnn-install
          OPENCV_ANDROID: ${{ env.BUILD_DIR }}/opencv-android
        run: |
          ./gradlew :hyperlpr3:assembleRelease \
            --stacktrace \
            -Pandroid.useAndroidX=true \
            -PNCNN_ROOT="${{ env.BUILD_DIR }}/ncnn-install" \
            -POPENCV_ANDROID="${{ env.BUILD_DIR }}/opencv-android"

      - name: Build APK
        working-directory: hyperlpr3-android-sdk-master
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NCNN_ROOT: ${{ env.BUILD_DIR }}/ncnn-install
          OPENCV_ANDROID: ${{ env.BUILD_DIR }}/opencv-android
        run: |
          ./gradlew :app:assembleRelease \
            --stacktrace \
            -Pandroid.useAndroidX=true \
            -PNCNN_ROOT="${{ env.BUILD_DIR }}/ncnn-install" \
            -POPENCV_ANDROID="${{ env.BUILD_DIR }}/opencv-android"

      - name: Collect APK artefacts
        working-directory: hyperlpr3-android-sdk-master
        run: |
          mkdir -p "${{ env.BUILD_DIR }}/apk-out"
          find app/build/outputs -name "*.apk" -exec cp -v {} "${{ env.BUILD_DIR }}/apk-out/" \;
          find hyperlpr3/build/outputs -name "*.aar" -exec cp -v {} "${{ env.BUILD_DIR }}/apk-out/" \;
          ls -la "${{ env.BUILD_DIR }}/apk-out"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hyperlpr3-apk
          path: ${{ env.BUILD_DIR }}/apk-out/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: hyperlpr3-aar
          path: ${{ env.BUILD_DIR }}/apk-out/*.aar
          if-no-files-found: warn
          retention-days: 30
