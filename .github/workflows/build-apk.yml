# SPDX-License-Identifier: MIT
name: build-apk

on:
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build AAR & APK
    runs-on: ubuntu-22.04

    env:
      NDK_VERSION: 26.1.10909125
      NCNN_VERSION: 20240820
      ANDROID_API: 21
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang g++-multilib \
            git ca-certificates \
            protobuf-compiler libprotobuf-dev \
            unzip zip

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            hyperlpr3-android-sdk-master/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('hyperlpr3-android-sdk-master/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build NCNN host tools (onnx2ncnn / ncnnoptimize)
        run: |
          bash scripts/build_ncnn_host.sh \
            ./ncnn \
            "${{ env.BUILD_DIR }}/ncnn-host-install"

      - name: Convert ONNX models to NCNN
        run: |
          bash scripts/convert_onnx_to_ncnn.sh \
            "${{ env.BUILD_DIR }}/ncnn-host-install/bin" \
            ./PlateDetectionRecognition/test \
            "${{ env.BUILD_DIR }}/plate_ncnn_models"

      - name: Copy NCNN models into Android assets
        run: |
          mkdir -p hyperlpr3-android-sdk-master/hyperlpr3/src/main/assets/plate_ncnn
          cp -f "${{ env.BUILD_DIR }}/plate_ncnn_models/"*.param \
                "${{ env.BUILD_DIR }}/plate_ncnn_models/"*.bin \
                hyperlpr3-android-sdk-master/hyperlpr3/src/main/assets/plate_ncnn/ 2>/dev/null \
                || (echo "ERROR: model files not produced" && exit 1)
          ls -la hyperlpr3-android-sdk-master/hyperlpr3/src/main/assets/plate_ncnn/

      - name: Make gradlew executable
        working-directory: hyperlpr3-android-sdk-master
        run: chmod +x gradlew

      - name: Build AAR
        working-directory: hyperlpr3-android-sdk-master
        run: |
          ./gradlew :hyperlpr3:assembleRelease \
            --stacktrace \
            -Pandroid.useAndroidX=true

      - name: Build APK
        working-directory: hyperlpr3-android-sdk-master
        run: |
          ./gradlew :app:assembleRelease \
            --stacktrace \
            -Pandroid.useAndroidX=true

      - name: Collect APK artefacts
        working-directory: hyperlpr3-android-sdk-master
        run: |
          mkdir -p "${{ env.BUILD_DIR }}/apk-out"
          find app/build/outputs -name "*.apk" -exec cp -v {} "${{ env.BUILD_DIR }}/apk-out/" \;
          find hyperlpr3/build/outputs -name "*.aar" -exec cp -v {} "${{ env.BUILD_DIR }}/apk-out/" \;
          ls -la "${{ env.BUILD_DIR }}/apk-out"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hyperlpr3-apk
          path: ${{ env.BUILD_DIR }}/apk-out/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: hyperlpr3-aar
          path: ${{ env.BUILD_DIR }}/apk-out/*.aar
          if-no-files-found: warn
          retention-days: 30